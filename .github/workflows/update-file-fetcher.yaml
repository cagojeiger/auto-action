name: Update File-Fetcher

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 01:00 UTC(10:00 KST) 실행
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-file-fetcher:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Fetch latest rclone version
        id: fetch_rclone
        run: |
          LATEST_RELEASE=$(gh api repos/rclone/rclone/releases/latest)
          LATEST_VERSION=$(echo "$LATEST_RELEASE" | jq -r '.tag_name' | sed 's/^v//')

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest rclone version"
            exit 1
          fi

          CURRENT_VERSION=$(grep '^ARG RCLONE_VERSION=' containers/file-fetcher/Dockerfile | sed 's/ARG RCLONE_VERSION=//')

          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "::notice::Current: $CURRENT_VERSION → Latest: $LATEST_VERSION"

      - name: Update Dockerfile
        run: |
          sed -i "s/^ARG RCLONE_VERSION=.*/ARG RCLONE_VERSION=${{ env.LATEST_VERSION }}/" containers/file-fetcher/Dockerfile

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet -- containers/file-fetcher/Dockerfile; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR, merge, and trigger downstream
        if: steps.check_changes.outputs.changes == 'true'
        uses: ./.github/actions/create-merge-trigger
        with:
          version: ${{ env.LATEST_VERSION }}
          branch_prefix: update-file-fetcher
          files_to_add: containers/file-fetcher/Dockerfile
          commit_message: "chore: file-fetcher 업데이트 (rclone v${{ env.LATEST_VERSION }})"
          pr_title: "chore: file-fetcher 업데이트 (rclone v${{ env.LATEST_VERSION }})"
          pr_body: |
            GitHub Action이 rclone을 업데이트하였습니다.

            - rclone: ${{ env.CURRENT_VERSION }} → ${{ env.LATEST_VERSION }}
          container_name: file-fetcher
